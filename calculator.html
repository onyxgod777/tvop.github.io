<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden π Calculator — The True Value Of Pi</title>
  <meta name="description" content="Interactive calculator using golden π = 4/√φ = 3.144605511030. Full expression evaluator with trig, comparison mode." />
  <meta property="og:title" content="Golden π Calculator" />
  <meta property="og:description" content="Interactive calculator using golden π = 4/√φ = 3.144605511030. Full expression evaluator with trig, comparison mode." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    :root {
      --navy: #0a1628; --navy-light: #132044; --navy-dark: #060e1a;
      --gold: #d4a843; --gold-light: #f0d080; --gold-dim: #a07830;
      --border: rgba(212,168,67,0.3); --text: #e8e0d0; --text-muted: #a09880;
      --green: #4caf7d; --red: #e8605a; --card-bg: #0f1e36;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--navy); color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .calc-wrap {
      max-width: 620px;
      margin: 0 auto;
      padding: 100px 16px 40px;
    }

    .calc-wrap h1 {
      color: var(--gold);
      font-size: 26px;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .calc-wrap .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 24px;
      font-family: 'Courier New', monospace;
    }

    /* ── Mode Bar ── */
    .mode-bar {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 16px;
      background: var(--navy-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .mode-btn {
      flex: 1;
      padding: 10px 12px;
      text-align: center;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      border: none;
      letter-spacing: 0.5px;
    }
    .mode-btn:hover { color: var(--gold-light); background: rgba(212,168,67,0.08); }
    .mode-btn.active {
      color: var(--gold-light);
      background: rgba(212,168,67,0.15);
      font-weight: bold;
    }
    .mode-btn.active-golden { border-bottom: 2px solid var(--gold); }
    .mode-btn.active-standard { border-bottom: 2px solid var(--text-muted); }

    /* ── Display ── */
    .display-area {
      background: var(--navy-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      margin-bottom: 12px;
      min-height: 80px;
    }
    .display-area .formula {
      font-size: 14px;
      color: var(--text-muted);
      min-height: 22px;
      word-break: break-all;
      font-family: 'Courier New', monospace;
    }
    .display-area .result {
      font-size: 28px;
      color: var(--gold-light);
      min-height: 36px;
      word-break: break-all;
      text-align: right;
      font-family: 'Courier New', monospace;
    }
    .display-area .result.error {
      color: var(--red);
      font-size: 16px;
    }

    /* ── Button Grid ── */
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 16px;
    }
    .btn-grid button {
      padding: 13px 4px;
      font-size: 15px;
      font-family: 'Courier New', monospace;
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.12s;
    }
    .btn-grid button:hover { background: var(--navy-light); border-color: var(--gold-dim); }
    .btn-grid button:active { transform: scale(0.95); background: rgba(212,168,67,0.15); }
    .btn-grid button.fn { color: var(--gold); font-size: 13px; }
    .btn-grid button.op { color: var(--gold-light); font-size: 18px; }
    .btn-grid button.const { color: var(--gold-dim); font-size: 14px; }
    .btn-grid button.eq { background: var(--gold-dim); color: var(--navy-dark); font-weight: bold; border-color: var(--gold); }
    .btn-grid button.eq:hover { background: var(--gold); }
    .btn-grid button.clr { color: var(--red); }
    .btn-grid button.bs { color: var(--red); }

    /* ── π Info Bar ── */
    .pi-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 12px 16px;
      background: var(--navy-dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }
    .pi-bar .golden { color: var(--gold-light); }
    .pi-bar .standard { color: var(--text-muted); }

    /* ── Trig Compare ── */
    .trig-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      margin-bottom: 20px;
    }
    .trig-table th {
      background: var(--navy-dark);
      color: var(--gold-dim);
      padding: 7px 8px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .trig-table td {
      padding: 6px 8px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .trig-table .gold { color: var(--gold-light); }
    .trig-table .std { color: var(--text-muted); }
    .trig-table .diff-pos { color: var(--green); }
    .trig-table .diff-neg { color: var(--red); }

    .trig-table .angle-label { color: var(--gold); font-weight: bold; }

    @media (max-width: 480px) {
      .calc-wrap { padding: 80px 10px 30px; }
      .calc-wrap h1 { font-size: 20px; }
      .btn-grid { gap: 4px; }
      .btn-grid button { padding: 11px 2px; font-size: 13px; }
      .display-area .result { font-size: 22px; }
      .pi-bar { font-size: 11px; gap: 10px; }
      .trig-table { font-size: 10px; }
      .trig-table th, .trig-table td { padding: 4px 3px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header">
    <h1><span>Φ</span> The True Value Of Pi <span>Π</span></h1>
    <div class="menu">
      <ul>
        <li><a href="index.html">HOME</a></li>
        <li><a href="blog/index.html">BLOG</a></li>
        <li><a href="calculator.html" style="color:var(--gold-light);">CALC</a></li>
      </ul>
    </div>
  </div>
</header>

<div class="calc-wrap">

<h1>Golden π Calculator</h1>
<p class="subtitle">π<sub>g</sub> = 4/√φ &middot; √(√320−8)</p>

<!-- ── Mode Toggle ── -->
<div class="mode-bar">
  <button class="mode-btn active active-golden" data-mode="golden" onclick="setMode('golden')">✦ Golden π</button>
  <button class="mode-btn" data-mode="standard" onclick="setMode('standard')">◯ Standard π</button>
</div>

<!-- ── Display ── -->
<div class="display-area">
  <div class="formula" id="formula">&nbsp;</div>
  <div class="result" id="display">0</div>
</div>

<!-- ── π Info Bar ── -->
<div class="pi-bar" id="piBar">
  <span class="golden">π<sub>g</sub> = 3.144605511030</span>
  <span class="standard">π = 3.141592653590</span>
  <span>Ratio: <span id="ratioDisplay">+0.0955</span>%</span>
</div>

<!-- ── Button Grid ── -->
<div class="btn-grid">
  <button class="fn" onclick="insert('sin(')">sin</button>
  <button class="fn" onclick="insert('cos(')">cos</button>
  <button class="fn" onclick="insert('tan(')">tan</button>
  <button class="fn" onclick="insert('asin(')">asin</button>
  <button class="fn" onclick="insert('acos(')">acos</button>

  <button class="fn" onclick="insert('atan(')">atan</button>
  <button class="fn" onclick="insert('sqrt(')">√</button>
  <button class="fn" onclick="insert('abs(')">abs</button>
  <button class="const" onclick="insert('πg')">π<sub>g</sub></button>
  <button class="const" onclick="insert('π')">π</button>

  <button class="const" onclick="insert('φ')">φ</button>
  <button class="const" onclick="insert('e')">e</button>
  <button class="op" onclick="insert('^')">^</button>
  <button class="op" onclick="insert('(')">(</button>
  <button class="op" onclick="insert(')')">)</button>

  <button class="clr" onclick="clearAll()">AC</button>
  <button class="bs" onclick="backspace()">⌫</button>
  <button style="color:var(--gold-dim);" onclick="insert('%')">%</button>
  <button class="op" onclick="insert('/')">÷</button>
  <button class="op" onclick="insert('*')">×</button>

  <button onclick="insert('7')">7</button>
  <button onclick="insert('8')">8</button>
  <button onclick="insert('9')">9</button>
  <button class="op" onclick="insert('-')">−</button>
  <button class="eq" onclick="evaluate()">=</button>

  <button onclick="insert('4')">4</button>
  <button onclick="insert('5')">5</button>
  <button onclick="insert('6')">6</button>
  <button class="op" onclick="insert('+')">+</button>
  <button class="fn" onclick="insert('πg/π')" style="font-size:11px;">π<sub>g</sub>/π</button>

  <button onclick="insert('1')">1</button>
  <button onclick="insert('2')">2</button>
  <button onclick="insert('3')">3</button>
  <button onclick="insert('0')">0</button>
  <button onclick="insert('.')">.</button>
</div>

<!-- ── Trig Comparison Table ── -->
<h3 style="color:var(--gold);font-size:15px;margin-bottom:8px;">Trigonometric Comparison</h3>
<table class="trig-table" id="trigTable">
  <thead>
    <tr>
      <th>Angle</th>
      <th>sin (golden)</th>
      <th>sin (standard)</th>
      <th>Δ%</th>
      <th>cos (golden)</th>
      <th>cos (standard)</th>
      <th>Δ%</th>
    </tr>
  </thead>
  <tbody id="trigBody"></tbody>
</table>

</div>

<footer>
  <div class="social">
    <a href="https://x.com/onyxgod777" class="fa fa-twitter"></a>
    <a href="https://www.youtube.com/onyxgod777" class="fa fa-youtube"></a>
    <a href="https://www.instagram.com/judeandrecharles" class="fa fa-instagram"></a>
    <a href="https://github.com/onyxgod777" class="fa fa-github"></a>
  </div>
  <p>π = 4/√φ &middot; √(√320−8) &middot; 3.144605511030</p>
</footer>

<script>
// ═══════════════════════════════════════════════════════════════
//  Golden π Calculator — Pure Vanilla JS
// ═══════════════════════════════════════════════════════════════

// ── Constants ──
const PHI = (1 + Math.sqrt(5)) / 2;          // 1.618033988749895
const PI_G = 4 / Math.sqrt(PHI);              // 3.144605511029693
const PI_S = Math.PI;                         // 3.141592653589793
const EULER = Math.E;                         // 2.718281828459045

// ── State ──
let mode = 'golden';
let display = '0';
let formula = '';

// DOM refs
const displayEl = document.getElementById('display');
const formulaEl = document.getElementById('formula');
const trigBody = document.getElementById('trigBody');

// ── Trig implementations ──
// Golden mode: convert deg→rad using PI_G, compute, then normalize so sin(90°)=1
const SIN_90_G = Math.sin(90 * PI_G / 180);  // normalization factor

function sinG(deg)  { return Math.sin(deg * PI_G / 180) / SIN_90_G; }
function cosG(deg)  { return Math.cos(deg * PI_G / 180) / SIN_90_G; }
function tanG(deg)  { return Math.tan(deg * PI_G / 180); }  // tan = sin/cos, normalization cancels
function asinG(v)   { return Math.asin(v * SIN_90_G) * 180 / PI_G; }
function acosG(v)   { return Math.acos(v * SIN_90_G) * 180 / PI_G; }
function atanG(v)   { return Math.atan(v) * 180 / PI_G; }

function sinS(deg)  { return Math.sin(deg * PI_S / 180); }
function cosS(deg)  { return Math.cos(deg * PI_S / 180); }
function tanS(deg)  { return Math.tan(deg * PI_S / 180); }
function asinS(v)   { return Math.asin(v) * 180 / PI_S; }
function acosS(v)   { return Math.acos(v) * 180 / PI_S; }
function atanS(v)   { return Math.atan(v) * 180 / PI_S; }

// ── Mode switching ──
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.remove('active', 'active-golden', 'active-standard');
    if (b.dataset.mode === m) {
      b.classList.add('active');
      b.classList.add(m === 'golden' ? 'active-golden' : 'active-standard');
    }
  });
  document.getElementById('ratioDisplay').textContent =
    (((PI_G / PI_S - 1) * 100).toFixed(4));
  renderTrigTable();
}

// ── Display helpers ──
function updateDisplay() {
  displayEl.textContent = display;
  displayEl.className = 'result';
  formulaEl.innerHTML = formula || '&nbsp;';
}

function insert(val) {
  if (display === '0' && !'+-*/^%'.includes(val) && val !== ')') {
    display = (val === '.' ? '0.' : val);
  } else {
    display += val;
  }
  updateDisplay();
}

function backspace() {
  if (display.length <= 1) { display = '0'; }
  else { display = display.slice(0, -1); }
  updateDisplay();
}

function clearAll() {
  display = '0'; formula = '';
  updateDisplay();
}

// ── Expression evaluator ──
function evaluate() {
  if (!display || display === '0') return;

  try {
    let expr = display;

    // Expand constants to full precision BEFORE evaluation
    expr = expr.replace(/πg|pi_g/gi, `(${PI_G})`);
    expr = expr.replace(/(?<![a-zA-Z])π(?!_)/g, `(${mode === 'golden' ? PI_G : PI_S})`);
    expr = expr.replace(/φ|phi/gi, `(${PHI})`);
    expr = expr.replace(/(?<![a-zA-Z])e(?![a-zA-Z(])/g, `(${EULER})`);

    // ^ → **
    expr = expr.replace(/\^/g, '**');

    // Function replacements
    const funcs = ['sin', 'cos', 'tan', 'asin', 'acos', 'atan'];
    for (const fn of funcs) {
      while (expr.includes(fn + '(')) {
        expr = expr.replace(fn + '(', fn + '_eval(');
      }
    }
    expr = expr.replace(/sqrt\(/g, 'Math.sqrt(');
    expr = expr.replace(/abs\(/g, 'Math.abs(');

    // Build evaluator with the correct trig implementations
    let fn;
    if (mode === 'golden') {
      fn = new Function('sin_eval','cos_eval','tan_eval','asin_eval','acos_eval','atan_eval','Math',
        `return (${expr})`);
      var result = fn(sinG, cosG, tanG, asinG, acosG, atanG, Math);
    } else {
      fn = new Function('sin_eval','cos_eval','tan_eval','asin_eval','acos_eval','atan_eval','Math',
        `return (${expr})`);
      var result = fn(sinS, cosS, tanS, asinS, acosS, atanS, Math);
    }

    if (!isFinite(result)) throw new Error('Undefined');

    formula = display + ' =';
    display = String(parseFloat(result.toFixed(12)));
    updateDisplay();
  } catch(e) {
    formula = display + ' =';
    display = 'Error';
    displayEl.className = 'result error';
    formulaEl.innerHTML = formula;
  }
}

// ── Trig Comparison Table ──
function renderTrigTable() {
  const angles = [0, 15, 30, 45, 60, 75, 90, 180, 270, 360];
  const PI = mode === 'golden' ? PI_G : PI_S;
  const sF = mode === 'golden' ? sinG : sinS;
  const cF = mode === 'golden' ? cosG : cosS;

  let html = '';
  for (const deg of angles) {
    const sv = sF(deg);
    const cv = cF(deg);
    const sv_s = sinS(deg);
    const cv_s = cosS(deg);

    const sinDiff = ((sv - sv_s) / sv_s) * 100;
    const cosDiff = ((cv - cv_s) / cv_s) * 100;

    html += `<tr>
      <td class="angle-label">${deg}°</td>
      <td class="gold">${sv.toFixed(10)}</td>
      <td class="std">${sv_s.toFixed(10)}</td>
      <td class="${sinDiff >= 0 ? 'diff-pos' : 'diff-neg'}">${sinDiff >= 0 ? '+' : ''}${sinDiff.toFixed(4)}%</td>
      <td class="gold">${cv.toFixed(10)}</td>
      <td class="std">${cv_s.toFixed(10)}</td>
      <td class="${cosDiff >= 0 ? 'diff-pos' : 'diff-neg'}">${cosDiff >= 0 ? '+' : ''}${cosDiff.toFixed(4)}%</td>
    </tr>`;
  }
  trigBody.innerHTML = html;
}

// ── Keyboard support ──
document.addEventListener('keydown', (e) => {
  const key = e.key;
  if (/^[\d.+\-*/^%()]$/.test(key)) { insert(key); e.preventDefault(); }
  else if (key === 'Enter') { evaluate(); e.preventDefault(); }
  else if (key === 'Backspace') { backspace(); e.preventDefault(); }
  else if (key === 'Escape') { clearAll(); e.preventDefault(); }
  else if (key === 'p') { insert('πg'); e.preventDefault(); }
  else if (key === 'P') { insert('π'); e.preventDefault(); }
  else if (key === 'f' || key === 'F') { insert('φ'); e.preventDefault(); }
});

// ── Init ──
renderTrigTable();
setMode('golden');
</script>

</body>
</html>
