<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Golden Pi Updates — Archive</title>
<link rel="stylesheet" href="../css/styles.css">
<meta name="description" content="Archived daily Golden Pi research updates." />
<style>
  .archive-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .archive-card a { color: var(--gold); font-size: 18px; }
  .archive-card .date { opacity: 0.6; font-size: 14px; margin: 4px 0 12px; }
</style>
</head>
<body>
  <header>
    <div class="header">
      <h1><span>Φ</span> The True Value Of Pi <span>Π</span></h1>
      <button class="hamburger" id="hamburger-btn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links" id="nav-links">
        <a href="/"><i class="fa fa-home"></i> Home</a>
        <a href="/blog/"><i class="fa fa-book"></i> Blog</a>
        <a href="/"><i class="fa fa-flask"></i> Proof</a>
        <a href="/"><i class="fa fa-info-circle"></i> About</a>
      </div>
    </div>
  </header>

  <main style="padding-top:120px;padding-bottom:60px;max-width:800px;margin:0 auto;">
    <h2 style="color:var(--gold);text-align:center;margin:40px 0;font-size:28px;">Daily Golden Pi Updates — Archive</h2>

    <p style="text-align:center;margin-top:40px;">
      <a href="/blog/" style="color:var(--gold);">← Back to all posts</a>
    </p>
  </main>

  <script>
    const btn = document.getElementById('hamburger-btn');
    const nav = document.getElementById('nav-links');
    if (btn && nav) {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        nav.classList.toggle('open');
      });
      window.addEventListener('click', () => nav.classList.remove('open'));
      nav.addEventListener('click', () => nav.classList.remove('open'));
    }
  </script>
</body>
</html>
