<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#ffd700" stroke-width="4"/>
  <!-- Fishing hook -->
  <path d="M200 180 Q200 120 256 120 Q312 120 312 180 L312 240 Q312 280 280 280 Q256 280 256 260 Q256 240 270 240 Q285 240 285 260" 
        fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Lure body -->
  <ellipse cx="256" cy="280" rx="30" ry="15" fill="url(#gold)" filter="url(#glow)"/>
  <!-- Feathers -->
  <path d="M226 290 Q210 330 220 350" stroke="#ff4444" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M246 295 Q240 340 250 360" stroke="#44ff44" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M266 295 Q272 340 262 360" stroke="#4488ff" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M286 290 Q302 330 292 350" stroke="#ffaa00" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Text -->
  <text x="256" y="420" font-family="Arial Black, sans-serif" font-size="48" font-weight="bold" 
        fill="url(#gold)" text-anchor="middle" filter="url(#glow)">$LURE</text>
  <text x="256" y="455" font-family="Arial, sans-serif" font-size="18" 
        fill="#888" text-anchor="middle">THE BAIT THAT CATCHES</text>
</svg>